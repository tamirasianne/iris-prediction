apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-predictor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iris-predictor
  template:
    metadata:
      labels:
        app: iris-predictor
    spec:
      containers:
        - name: iris-predictor
          image: tamirasianne/iris-predictor:latest
          ports:
            - containerPort: 5000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: iris-predictor-service
spec:
  type: NodePort
  selector:
    app: iris-predictor
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007
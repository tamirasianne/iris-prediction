<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f7;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Iris Flower Prediction</h2>

    <form action="/predict" method="post">

        <div class="form-group">
            <label for="sepal_length">Sepal Length (4.0 – 8.0)</label>
            <input type="number" step="0.1" name="sepal_length" id="sepal_length" required>
        </div>

        <div class="form-group">
            <label for="sepal_width">Sepal Width (2.0 – 4.5)</label>
            <input type="number" step="0.1" name="sepal_width" id="sepal_width" required>
        </div>

        <div class="form-group">
            <label for="petal_length">Petal Length (1.0 – 7.0)</label>
            <input type="number" step="0.1" name="petal_length" id="petal_length" required>
        </div>

        <div class="form-group">
            <label for="petal_width">Petal Width (0.1 – 2.6)</label>
            <input type="number" step="0.1" name="petal_width" id="petal_width" required>
        </div>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        <h3>{{ prediction_text }}</h3>
        <h4>{{ confidence_text }}</h4>
    </div>

</div>

</body>
</html>
